syntax = "proto3";

option csharp_namespace = "email_constructor.Api";

service EmailContentBlock {
  rpc GetEmailTemplate (GetEmailTemplateRequest) returns (GetEmailTemplateResponse);
}

message GetEmailTemplateRequest {
  string languageId = 1;
  string storeId = 2;
  string productCacheKey = 3;
  repeated Block blocks = 4;
  WrapperType wrapperType = 5;
  bool isDefaultBlock = 6;
}

message GetEmailTemplateResponse {
  repeated Block blocks = 1;
}

message Block {
  string type = 1;
  string Html = 2;
  map<string, string> payload = 3;
}

enum WrapperType {
  WRAPPER_NONE = 0;
  WRAPPER_DEFAULT = 1;
  WRAPPER_S_CARDS = 2;
}